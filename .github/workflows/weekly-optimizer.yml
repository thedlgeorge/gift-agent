name: Weekly Gift Optimizer

on:
  schedule:
    - cron: '0 9 * * 1'   # 9am UTC every Monday
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        run: python -c "from tools.db import init_db; init_db()"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Fetch latest prices (ensure fresh data before optimizing)
        run: python main.py track
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}

      - name: Run AI gift optimizer
        run: python main.py optimize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}

      - name: Upload recommendations DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: recommendations-${{ github.run_number }}
          path: data/gift_agent.db
          retention-days: 90
